.toolbar{background:var(--blue);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.toolbar h1{font-family:'DM Serif Display',serif;color:#fff;font-size:1.2rem;font-weight:400}
.toolbar p{color:#aac4e8;font-size:0.8rem;margin-top:2px}
.btn{padding:9px 18px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:600;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-reload{background:rgba(255,255,255,.15);color:#fff}

.filter-bar{background:#fff;border-bottom:1px solid var(--border);padding:12px 32px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.filter-bar label{font-size:0.8rem;font-weight:600;color:#888}
.filter-bar select,.filter-bar input{padding:6px 10px;border:1.5px solid var(--border);border-radius:6px;font-family:'DM Sans',sans-serif;font-size:0.82rem;background:#fafbfd}

.stats-bar{padding:16px 32px;display:flex;gap:16px;flex-wrap:wrap}
.stat{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 20px;min-width:130px}
.stat-label{font-size:0.7rem;font-weight:700;color:#aaa;letter-spacing:.5px;text-transform:uppercase}
.stat-value{font-size:1.5rem;font-weight:700;color:var(--blue);margin-top:2px}
.stat-value.orange{color:var(--orange)}
.stat-value.green{color:var(--green)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:20px;padding:0 32px 40px}
#loading,#error-msg{text-align:center;padding:60px 32px;color:#888}
#error-msg{color:#c0392b}

.pakbon{background:#fff;border-radius:14px;border:1.5px solid var(--border);overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.05);transition:opacity .3s,filter .3s}
.pakbon.afgehandeld{opacity:.4;filter:grayscale(1)}

.pakbon-header{background:var(--blue);padding:16px 20px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.pakbon-header .naam{font-family:'DM Serif Display',serif;color:#fff;font-size:1.2rem;font-weight:400}
.pakbon-header .tijdstip{color:#aac4e8;font-size:0.75rem;margin-top:3px}

.badge{padding:5px 12px;border-radius:20px;font-size:0.72rem;font-weight:700;white-space:nowrap;flex-shrink:0}
.badge-tikkie-open{background:#fff3e0;color:var(--orange)}
.badge-tikkie-paid{background:#e8f5e9;color:var(--green)}
.badge-contant{background:#e8f5e9;color:var(--green)}

.pakbon-body{padding:16px 20px}
.product-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f0f4fa}
.product-row:last-child{border-bottom:none}
.product-qty{background:var(--blue);color:#fff;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.85rem;font-weight:700;flex-shrink:0}
.product-naam{font-weight:600;font-size:0.9rem;flex:1}
.product-prijs{font-weight:700;color:var(--orange);font-size:0.9rem}
.smaak-tag{display:inline-block;background:#eef2f8;color:#555;border-radius:5px;padding:2px 7px;font-size:0.7rem;margin:3px 2px 0 0}

.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;background:var(--light);border-radius:10px;padding:12px}
.meta-label{font-size:0.67rem;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.4px}
.meta-value{font-size:0.85rem;color:#333;margin-top:1px;font-weight:500}

.pakbon-footer{border-top:2px dashed var(--border);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;background:#fafbfd}
.totaal-label{font-size:0.72rem;font-weight:700;color:#aaa;text-transform:uppercase}
.totaal-bedrag{font-size:1.4rem;font-weight:700;color:var(--blue)}
.donatie-badge{background:#e8f0fb;color:var(--blue);border-radius:8px;padding:4px 10px;font-size:0.75rem;font-weight:600}

.pakbon-actions{border-top:1px solid var(--border)}
.action-row{display:flex;align-items:center;gap:10px;padding:10px 20px;border-bottom:1px solid #f0f4fa}
.action-row:last-child{border-bottom:none}
.action-row label{font-size:0.82rem;font-weight:600;color:#555;cursor:pointer;flex:1}
.action-row input[type=checkbox]{width:17px;height:17px;accent-color:var(--green);cursor:pointer;flex-shrink:0}

.switch{position:relative;display:inline-block;width:40px;height:22px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;inset:0;background:#ddd;border-radius:22px;transition:.3s}
.slider:before{content:"";position:absolute;width:16px;height:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
input:checked+.slider{background:var(--green)}
input:checked+.slider:before{transform:translateX(18px)}

.btn-print{margin-left:auto;background:var(--blue);color:#fff;border:none;border-radius:7px;padding:6px 14px;font-size:0.78rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-print:hover{opacity:.85}

<body>

<div class="toolbar">
  <div>
    <h1>📦 Pakbonnen – Bakactie Alpe d'HuZes</h1>
    <p id="last-updated">Laden...</p>
  </div>
  <div>
    <button class="btn btn-reload" onclick="loadCSV()">↺ Vernieuwen</button>
  </div>
</div>

<div class="filter-bar">
  <label>Dag:</label>
  <select id="filter-dag" onchange="renderPakbonnen()"><option value="">Alle dagen</option></select>
  <label>Betaling:</label>
  <select id="filter-betaling" onchange="renderPakbonnen()">
    <option value="">Alles</option>
    <option value="tikkie">Tikkie</option>
    <option value="contant">Contant</option>
  </select>
  <label>Zoek:</label>
  <input type="text" id="filter-zoek" placeholder="Naam of email..." oninput="renderPakbonnen()" style="width:200px">
</div>

<div class="stats-bar" id="stats-bar"></div>
<div id="loading">⏳ Bestellingen laden...</div>
<div id="error-msg" style="display:none"></div>
<div class="grid" id="grid" style="display:none"></div>

<script>
let orders = [];

// Persistente state per originele index
// state[i] = { tikkie: bool, afgehandeld: bool }
const state = {};

function getState(i) {
  if (!state[i]) state[i] = { tikkie: false, afgehandeld: false };
  return state[i];
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const result = [];
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const cols = [];
    let inQ = false, cur = '';
    for (let c = 0; c < line.length; c++) {
      const ch = line[c];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    cols.push(cur.trim());
    if (cols.length >= 8) result.push(cols);
  }
  return result;
}

async function loadCSV() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('grid').style.display = 'none';
  document.getElementById('error-msg').style.display = 'none';
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 10000);
    let res;
    try {
      res = await fetch('https://raw.githubusercontent.com/cjslabbekoorn-cmd/bakactie-Henco/main/bestellingen.csv?t=' + Date.now(), { signal: controller.signal });
    } finally {
      clearTimeout(timeout);
    }
    if (!res.ok) throw new Error('HTTP ' + res.status + ' – kon CSV niet laden');
    const text = await res.text();
    orders = parseCSV(text);
    document.getElementById('last-updated').textContent = 'Bijgewerkt: ' + new Date().toLocaleString('nl-NL');
    const dagen = [...new Set(orders.map(o => o[8] || '').filter(Boolean))];
    const dagSel = document.getElementById('filter-dag');
    dagSel.innerHTML = '<option value="">Alle dagen</option>';
    dagen.forEach(d => { const opt = document.createElement('option'); opt.value = d; opt.textContent = d; dagSel.appendChild(opt); });
    document.getElementById('loading').style.display = 'none';
    document.getElementById('grid').style.display = 'grid';
    renderPakbonnen();
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    const errEl = document.getElementById('error-msg');
    errEl.style.display = 'block';
    const msg = e.name === 'AbortError' ? 'Timeout – geen verbinding met GitHub. Controleer je internet en probeer opnieuw.' : e.message;
    errEl.innerHTML = '❌ ' + msg + '<br><br><button onclick="loadCSV()" style="margin-top:12px;padding:10px 20px;background:#1a4f8a;color:#fff;border:none;border-radius:8px;font-size:0.9rem;cursor:pointer">↺ Opnieuw proberen</button>';
  }
}

function renderPakbonnen() {
  const dag = document.getElementById('filter-dag').value;
  const betaling = document.getElementById('filter-betaling').value;
  const zoek = document.getElementById('filter-zoek').value.toLowerCase();

  const filtered = orders.filter((o, i) => {
    if (dag && o[8] !== dag) return false;
    const isTikkie = (o[10] || '').toLowerCase().includes('tikkie');
    if (betaling === 'tikkie' && !isTikkie) return false;
    if (betaling === 'contant' && isTikkie) return false;
    if (zoek && !(o[1]||'').toLowerCase().includes(zoek) && !(o[2]||'').toLowerCase().includes(zoek)) return false;
    return true;
  });

  // Stats
  const totaal = filtered.reduce((s, o) => s + (parseFloat(o[7]) || 0), 0);
  const tikkieCount = filtered.filter(o => (o[10]||'').toLowerCase().includes('tikkie')).length;
  const contantCount = filtered.length - tikkieCount;
  const donaties = filtered.reduce((s, o) => s + (parseFloat(o[12]) || 0), 0);
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat"><div class="stat-label">Bestellingen</div><div class="stat-value">${filtered.length}</div></div>
    <div class="stat"><div class="stat-label">Totaal omzet</div><div class="stat-value orange">€ ${totaal.toFixed(2).replace('.',',')}</div></div>
    <div class="stat"><div class="stat-label">Tikkie betaald</div><div class="stat-value">${tikkieCount}</div></div>
    <div class="stat"><div class="stat-label">Contant</div><div class="stat-value orange">${contantCount}</div></div>
    ${donaties > 0 ? `<div class="stat"><div class="stat-label">💙 Donaties</div><div class="stat-value green">€ ${donaties.toFixed(2).replace('.',',')}</div></div>` : ''}
  `;

  const grid = document.getElementById('grid');
  if (filtered.length === 0) {
    grid.innerHTML = '<p style="color:#aaa;padding:40px;grid-column:1/-1;text-align:center">Geen bestellingen gevonden.</p>';
    return;
  }

  grid.innerHTML = filtered.map(o => {
    const i = orders.indexOf(o);
    return pakbonKaart(o, i);
  }).join('');

  // Herstel state vanuit JS-object
  filtered.forEach(o => {
    const i = orders.indexOf(o);
    const s = state[i];
    if (!s) return;
    if (s.tikkie) {
      const el = document.getElementById('tikkie-' + i);
      if (el) el.checked = true;
      updateTikkieBadge(i, true);
    }
    if (s.afgehandeld) {
      const el = document.getElementById('check-' + i);
      if (el) el.checked = true;
      document.getElementById('pakbon-' + i)?.classList.add('afgehandeld');
    }
  });
}

function pakbonKaart(o, i) {
  const [tijdstip, naam, email, tel, kruid, cup, smaken, totaal, dag, dagdeel, betaling, opmerkingen, donatie] = o;
  const isTikkie = (betaling || '').toLowerCase().includes('tikkie');

  let producten = '';
  if (parseInt(kruid) > 0) {
    producten += `<div class="product-row">
      <div class="product-qty">${kruid}</div>
      <div class="product-naam">🥮 Kruidkoek</div>
      <div class="product-prijs">€ ${(parseInt(kruid)*7.5).toFixed(2).replace('.',',')}</div>
    </div>`;
  }
  if (parseInt(cup) > 0) {
    const tags = (smaken||'').split('|').map(s=>s.trim()).filter(Boolean).map(s=>`<span class="smaak-tag">${s}</span>`).join('');
    producten += `<div class="product-row">
      <div class="product-qty">${cup}</div>
      <div class="product-naam">🧁 Cupcakes<br><span style="font-weight:400;font-size:0.75rem;color:#888">${tags}</span></div>
      <div class="product-prijs">€ ${(parseInt(cup)*6).toFixed(2).replace('.',',')}</div>
    </div>`;
  }
  if (parseFloat(donatie) > 0) {
    producten += `<div class="product-row">
      <div class="product-qty" style="background:#1a6e3c">1</div>
      <div class="product-naam">💙 Extra donatie <span style="font-weight:400;font-size:0.75rem;color:#1a6e3c">Alpe d'HuZes</span></div>
      <div class="product-prijs" style="color:#1a6e3c">€ ${parseFloat(donatie).toFixed(2).replace('.',',')}</div>
    </div>`;
  }

  const opmHTML = opmerkingen ? `<div style="grid-column:1/-1"><div class="meta-label">💬 Opmerkingen</div><div class="meta-value" style="color:#e67e00">${opmerkingen}</div></div>` : '';
  const donatieHTML = parseFloat(donatie) > 0 ? `<span class="donatie-badge">💙 € ${parseFloat(donatie).toFixed(2).replace('.',',')}</span>` : '';

  const tikkieRow = isTikkie ? `
    <div class="action-row">
      <label class="switch">
        <input type="checkbox" id="tikkie-${i}" onchange="onTikkieChange(${i})">
        <span class="slider"></span>
      </label>
      <label for="tikkie-${i}">📱 Tikkie ontvangen / betaald</label>
    </div>` : '';

  return `<div class="pakbon" id="pakbon-${i}">
    <div class="pakbon-header">
      <div>
        <div class="naam">${naam}</div>
        <div class="tijdstip">${tijdstip}</div>
      </div>
      <span class="badge ${isTikkie ? 'badge-tikkie-open' : 'badge-contant'}" id="badge-${i}">
        ${isTikkie ? '📱 Tikkie – nog niet betaald' : '💵 Contant – nog betalen'}
      </span>
    </div>
    <div class="pakbon-body">
      <div>${producten}</div>
      <div class="meta-grid">
        <div><div class="meta-label">📅 Afhaaldag</div><div class="meta-value">${dag}</div></div>
        <div><div class="meta-label">⏰ Dagdeel</div><div class="meta-value">${dagdeel}</div></div>
        <div><div class="meta-label">📧 Email</div><div class="meta-value" style="font-size:0.78rem">${email}</div></div>
        <div><div class="meta-label">📱 Telefoon</div><div class="meta-value">${tel||'–'}</div></div>
        ${opmHTML}
      </div>
    </div>
    <div class="pakbon-footer">
      <div>
        <div class="totaal-label">Totaalbedrag</div>
        <div class="totaal-bedrag">€ ${(parseFloat(totaal)||0).toFixed(2).replace('.',',')}</div>
      </div>
      ${donatieHTML}
    </div>
    <div class="pakbon-actions">
      ${tikkieRow}
      <div class="action-row">
        <input type="checkbox" id="check-${i}" onchange="onAfgehandeldChange(${i})">
        <label for="check-${i}">✅ Bestelling afgehandeld / uitgeleverd</label>
        <button class="btn-print" onclick="printPakbon(${i})">🖨️ Afdrukken</button>
      </div>
    </div>
  </div>`;
}

function updateTikkieBadge(i, betaald) {
  const badge = document.getElementById('badge-' + i);
  if (!badge) return;
  if (betaald) {
    badge.textContent = '📱 Tikkie – betaald ✓';
    badge.className = 'badge badge-tikkie-paid';
  } else {
    badge.textContent = '📱 Tikkie – nog niet betaald';
    badge.className = 'badge badge-tikkie-open';
  }
}

function onTikkieChange(i) {
  const checked = document.getElementById('tikkie-' + i).checked;
  getState(i).tikkie = checked;  // Sla op in state
  updateTikkieBadge(i, checked);
}

function onAfgehandeldChange(i) {
  const checked = document.getElementById('check-' + i).checked;
  getState(i).afgehandeld = checked;  // Sla op in state
  document.getElementById('pakbon-' + i)?.classList.toggle('afgehandeld', checked);
}

function printPakbon(i) {
  const o = orders[i];
  const [tijdstip, naam, email, tel, kruid, cup, smaken, totaal, dag, dagdeel, betaling, opmerkingen, donatie] = o;
  const isTikkie = (betaling||'').toLowerCase().includes('tikkie');
  const tikkieBetaald = isTikkie && getState(i).tikkie;

  const badgeText = isTikkie
    ? (tikkieBetaald ? '📱 Tikkie – betaald ✓' : '📱 Tikkie – nog niet betaald')
    : '💵 Contant – betalen op locatie';
  const badgeStyle = isTikkie
    ? (tikkieBetaald ? 'background:#e8f5e9;color:#1a6e3c' : 'background:#fff3e0;color:#f07d00')
    : 'background:#e8f5e9;color:#1a6e3c';

  let producten = '';

  if (parseInt(cup) > 0) {
    const tags = (smaken||'').split('|').map(s=>s.trim()).filter(Boolean).map(s=>`<span class="st">${s}</span>`).join('');
    producten += `<div class="pr"><div class="pq">${cup}</div><div class="pn">🧁 Cupcakes<br><span style="font-weight:400;font-size:0.8rem;color:#888">${tags}</span></div><div class="pp">€ ${(parseInt(cup)*6).toFixed(2).replace('.',',')}</div></div>`;
  }
  if (parseFloat(donatie) > 0) producten += `<div class="pr"><div class="pq" style="background:#1a6e3c">1</div><div class="pn">💙 Extra donatie <span style="font-weight:400;font-size:0.8rem;color:#1a6e3c">Alpe d'HuZes</span></div><div class="pp" style="color:#1a6e3c">€ ${parseFloat(donatie).toFixed(2).replace('.',',')}</div></div>`;

  const opmHTML = opmerkingen ? `<div style="grid-column:1/-1"><div class="ml">💬 Opmerkingen</div><div class="mv" style="color:#e67e00;font-weight:600">${opmerkingen}</div></div>` : '';
  const donatieHTML = parseFloat(donatie) > 0 ? `<span style="background:#e8f0fb;color:#1a4f8a;border-radius:8px;padding:6px 14px;font-size:0.85rem;font-weight:600">💙 Donatie € ${parseFloat(donatie).toFixed(2).replace('.',',')}</span>` : '';

  const html = `<!DOCTYPE html><html lang="nl"><head>

    .org{color:#aac4e8;font-size:0.75rem;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
