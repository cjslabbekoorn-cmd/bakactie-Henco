<!DOCTYPE html>

<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pakbonnen</title>
<style>
body { font-family: sans-serif; background: #f0f4fb; margin: 0; padding: 0; color: #222; }
h1 { background: #1a4f8a; color: #fff; margin: 0; padding: 16px 20px; font-size: 1.1rem; font-weight: 600; }
#info { padding: 8px 20px; background: #e8f0fb; font-size: 0.8rem; color: #555; }
#totalen { display: flex; gap: 12px; padding: 16px 20px; flex-wrap: wrap; }
.totaal-box { background: #fff; border-radius: 10px; padding: 12px 20px; border: 1px solid #d0daf0; min-width: 120px; }
.totaal-box .label { font-size: 0.65rem; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: .4px; }
.totaal-box .value { font-size: 1.5rem; font-weight: 700; color: #1a4f8a; margin-top: 2px; }
.value.oranje { color: #f07d00; }
.value.groen { color: #1a6e3c; }
#kaarten { padding: 0 20px 40px; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px,1fr)); gap: 16px; }
.kaart { background: #fff; border-radius: 12px; border: 1.5px solid #d0daf0; overflow: hidden; }
.kaart-hoofd { background: #1a4f8a; padding: 12px 16px; display: flex; justify-content: space-between; align-items: flex-start; }
.kaart-naam { color: #fff; font-size: 1rem; font-weight: 700; }
.kaart-tijd { color: #aac4e8; font-size: 0.72rem; margin-top: 2px; }
.badge { padding: 4px 10px; border-radius: 14px; font-size: 0.7rem; font-weight: 700; white-space: nowrap; }
.badge-open { background: #fff3e0; color: #f07d00; }
.badge-betaald { background: #e8f5e9; color: #1a6e3c; }
.badge-contant { background: #e8f5e9; color: #1a6e3c; }
.kaart-body { padding: 12px 16px; }
.regel { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #f0f4fa; font-size: 0.88rem; }
.regel:last-child { border-bottom: none; }
.regel-naam { font-weight: 600; }
.regel-prijs { font-weight: 700; color: #f07d00; }
.smaak { font-size: 0.7rem; color: #888; font-weight: 400; display: block; margin-top: 2px; }
.meta { background: #f5f7fb; border-radius: 8px; padding: 10px 12px; margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.82rem; }
.meta-label { font-size: 0.62rem; font-weight: 700; color: #bbb; text-transform: uppercase; }
.meta-val { margin-top: 1px; font-weight: 500; }
.kaart-voet { border-top: 2px dashed #d0daf0; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; background: #fafbfd; }
.totaal-label { font-size: 0.65rem; font-weight: 700; color: #bbb; text-transform: uppercase; }
.totaal-bedrag { font-size: 1.3rem; font-weight: 700; color: #1a4f8a; }
.tikkie-rij { border-top: 1px solid #eef2f8; padding: 10px 16px; display: flex; align-items: center; gap: 10px; background: #fffdf8; }
.tikkie-rij label { font-size: 0.82rem; font-weight: 600; color: #555; cursor: pointer; }
.switch { position: relative; display: inline-block; width: 40px; height: 22px; flex-shrink: 0; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; cursor: pointer; inset: 0; background: #ddd; border-radius: 22px; transition: .25s; }
.slider:before { content: ""; position: absolute; width: 16px; height: 16px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .25s; }
input:checked + .slider { background: #1a6e3c; }
input:checked + .slider:before { transform: translateX(18px); }

@media print {
body > * { display: none !important; }
#printdiv { display: block !important; }
}
#printdiv { display: none; font-family: sans-serif; padding: 20mm; }
#printdiv h2 { font-size: 1.8rem; margin-bottom: 4px; }
#printdiv .psub { color: #888; font-size: 0.8rem; margin-bottom: 16px; }
#printdiv .pbadge { display: inline-block; padding: 5px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; margin-bottom: 16px; }
#printdiv .pregel { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 0.95rem; }
#printdiv .pregel:last-child { border-bottom: none; }
#printdiv .pmeta { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; background: #f5f7fb; border-radius: 8px; padding: 14px; margin-top: 16px; }
#printdiv .pml { font-size: 0.65rem; font-weight: 700; color: #aaa; text-transform: uppercase; }
#printdiv .pmv { font-size: 0.9rem; font-weight: 500; margin-top: 2px; }
#printdiv .ptotaal { margin-top: 24px; border-top: 3px dashed #ccc; padding-top: 16px; display: flex; justify-content: space-between; align-items: center; }
#printdiv .ptl { font-size: 0.65rem; font-weight: 700; color: #aaa; text-transform: uppercase; }
#printdiv .ptb { font-size: 2rem; font-weight: 700; color: #1a4f8a; }
</style>

</head>
<body>
<h1>Pakbonnen &ndash; Bakactie Alpe d&#x27;HuZes</h1>
<div id="printdiv"></div>
<div id="info">Laden...</div>
<div id="totalen"></div>
<div id="kaarten"><p style="padding:20px;color:#888">Bestellingen laden...</p></div>

<script>
var tstate = {};
var orders = [];
try { var opgeslagen = localStorage.getItem('tstate'); if (opgeslagen) tstate = JSON.parse(opgeslagen); } catch(e) {}


function druk(idx) {
  var o = orders[idx];
  var naam = o[1]||'', tijd = o[0]||'', email = o[2]||'', tel = o[3]||'';
  var kruid = parseInt(o[4])||0, cup = parseInt(o[5])||0, smaken = o[6]||'';
  var totaal = parseFloat(o[7])||0, dag = o[8]||'', dagdeel = o[9]||'';
  var betaling = o[10]||'', opm = o[11]||'', donatie = parseFloat(o[12])||0;
  var isTikkie = betaling.toLowerCase().indexOf('tikkie') >= 0;
  var betaald = isTikkie && tstate[idx];
  var badgeTxt = isTikkie ? (betaald ? 'Tikkie - betaald' : 'Tikkie - nog niet betaald') : 'Contant - betalen op locatie';
  var badgeStl = isTikkie ? (betaald ? 'background:#e8f5e9;color:#1a6e3c' : 'background:#fff3e0;color:#f07d00') : 'background:#e8f5e9;color:#1a6e3c';

  var prod = '';
  if (kruid > 0) prod += '<div class="pregel"><span>&#x1F96E; Kruidkoek x'+kruid+'</span><span style="color:#f07d00;font-weight:700">&euro; '+(kruid*7.5).toFixed(2).replace('.',',')+'</span></div>';
  if (cup > 0) prod += '<div class="pregel"><span>&#x1F9C1; Cupcakes x'+cup+(smaken ? '<br><small style="color:#888">'+smaken+'</small>' : '')+'</span><span style="color:#f07d00;font-weight:700">&euro; '+(cup*6).toFixed(2).replace('.',',')+'</span></div>';
  if (donatie > 0) prod += '<div class="pregel"><span>&#x1F499; Extra donatie</span><span style="color:#1a6e3c;font-weight:700">&euro; '+donatie.toFixed(2).replace('.',',')+'</span></div>';

  var opmH = opm ? '<div style="grid-column:1/-1"><div class="pml">Opmerkingen</div><div class="pmv" style="color:#e67e00">'+opm+'</div></div>' : '';

  document.getElementById('printdiv').innerHTML =
    '<h2>'+naam+'</h2>'
    + '<div class="psub">Besteld op '+tijd+'</div>'
    + '<span class="pbadge" style="'+badgeStl+'">'+badgeTxt+'</span>'
    + prod
    + '<div class="pmeta">'
    + '<div><div class="pml">Afhaaldag</div><div class="pmv">'+dag+'</div></div>'
    + '<div><div class="pml">Dagdeel</div><div class="pmv">'+dagdeel+'</div></div>'
    + '<div><div class="pml">Email</div><div class="pmv" style="font-size:0.78rem">'+email+'</div></div>'
    + '<div><div class="pml">Telefoon</div><div class="pmv">'+(tel||'-')+'</div></div>'
    + opmH
    + '</div>'
    + '<div class="ptotaal"><div><div class="ptl">Totaalbedrag</div><div class="ptb">&euro; '+totaal.toFixed(2).replace('.',',')+'</div></div>'
    + (donatie > 0 ? '<div style="background:#e8f0fb;color:#1a4f8a;border-radius:7px;padding:6px 14px;font-size:0.85rem;font-weight:600">Donatie &euro; '+donatie.toFixed(2).replace('.',',')+'</div>' : '')
    + '</div>';

  window.print();
}

function laad() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', 'https://raw.githubusercontent.com/cjslabbekoorn-cmd/bakactie-Henco/main/bestellingen.csv?t=' + Date.now());
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    if (xhr.status === 200) {
      verwerk(xhr.responseText);
    } else {
      document.getElementById('kaarten').innerHTML = '<p style="padding:20px;color:red">Fout bij laden (status ' + xhr.status + ')</p>';
    }
  };
  xhr.onerror = function() {
    document.getElementById('kaarten').innerHTML = '<p style="padding:20px;color:red">Netwerkfout</p>';
  };
  xhr.send();
}

function verwerk(tekst) {
  var regels = tekst.trim().split('\n');
  orders = [];
  for (var i = 1; i < regels.length; i++) {
    var r = regels[i].trim();
    if (!r) continue;
    var cols = parseCsvRegel(r);
    if (cols.length >= 8) orders.push(cols);
  }

  document.getElementById('info').textContent = orders.length + ' bestellingen geladen';

  var totaal = 0, tikkieAantal = 0, contantAantal = 0, donaties = 0;
  for (var j = 0; j < orders.length; j++) {
    totaal += parseFloat(orders[j][7]) || 0;
    donaties += parseFloat(orders[j][12]) || 0;
    if ((orders[j][10] || '').toLowerCase().indexOf('tikkie') >= 0) tikkieAantal++;
    else contantAantal++;
  }

  document.getElementById('totalen').innerHTML =
    box('Bestellingen', orders.length, '') +
    box('Totaal', '&euro; ' + totaal.toFixed(2).replace('.', ','), 'oranje') +
    box('Tikkie', tikkieAantal, '') +
    box('Contant', contantAantal, '') +
    (donaties > 0 ? box('Donaties', '&euro; ' + donaties.toFixed(2).replace('.', ','), 'groen') : '');

  var html = '';
  for (var k = 0; k < orders.length; k++) {
    html += kaart(orders[k], k);
  }
  document.getElementById('kaarten').innerHTML = html;
  // Herstel tikkie state
  for (var idx in tstate) {
    if (tstate[idx]) {
      var el = document.getElementById('tik' + idx);
      var badge = document.getElementById('badge' + idx);
      if (el) el.checked = true;
      if (badge) { badge.textContent = 'Betaald'; badge.className = 'badge badge-betaald'; }
    }
  }
}

function parseCsvRegel(r) {
  var cols = [], inQ = false, cur = '';
  for (var i = 0; i < r.length; i++) {
    var c = r[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
    else { cur += c; }
  }
  cols.push(cur.trim());
  return cols;
}

function box(label, waarde, cls) {
  return '<div class="totaal-box"><div class="label">' + label + '</div><div class="value ' + cls + '">' + waarde + '</div></div>';
}

function kaart(o, idx) {
  var naam = o[1] || '', tijd = o[0] || '', email = o[2] || '', tel = o[3] || '';
  var kruid = parseInt(o[4]) || 0, cup = parseInt(o[5]) || 0, smaken = o[6] || '';
  var totaal = parseFloat(o[7]) || 0;
  var dag = o[8] || '', dagdeel = o[9] || '', betaling = o[10] || '';
  var opm = o[11] || '', donatie = parseFloat(o[12]) || 0;
  var isTikkie = betaling.toLowerCase().indexOf('tikkie') >= 0;

  var producten = '';
  if (kruid > 0) producten += '<div class="regel"><span class="regel-naam">&#x1F96E; Kruidkoek x' + kruid + '</span><span class="regel-prijs">&euro; ' + (kruid * 7.5).toFixed(2).replace('.', ',') + '</span></div>';
  if (cup > 0) producten += '<div class="regel"><span class="regel-naam">&#x1F9C1; Cupcakes x' + cup + (smaken ? '<span class="smaak">' + smaken + '</span>' : '') + '</span><span class="regel-prijs">&euro; ' + (cup * 6).toFixed(2).replace('.', ',') + '</span></div>';
  if (donatie > 0) producten += '<div class="regel"><span class="regel-naam">&#x1F499; Extra donatie</span><span class="regel-prijs" style="color:#1a6e3c">&euro; ' + donatie.toFixed(2).replace('.', ',') + '</span></div>';

  var opmHtml = opm ? '<div style="grid-column:1/-1"><div class="meta-label">Opmerkingen</div><div class="meta-val" style="color:#e67e00">' + opm + '</div></div>' : '';

  var tikkieRij = '';
  if (isTikkie) {
    tikkieRij = '<div class="tikkie-rij">'
      + '<label class="switch"><input type="checkbox" id="tik' + idx + '" onchange="wisselTikkie(' + idx + ')"><span class="slider"></span></label>'
      + '<label for="tik' + idx + '">Tikkie ontvangen &ndash; betaald</label>'
      + '</div>';
  }

  var badgeKlasse = isTikkie ? 'badge-open' : 'badge-contant';
  var badgeTekst = isTikkie ? 'Nog niet betaald' : 'Contant';

  return '<div class="kaart">'
    + '<div class="kaart-hoofd">'
    + '<div><div class="kaart-naam">' + naam + '</div><div class="kaart-tijd">' + tijd + '</div></div>'
    + '<span class="badge ' + badgeKlasse + '" id="badge' + idx + '">' + badgeTekst + '</span>'
    + '</div>'
    + '<div class="kaart-body">'
    + producten
    + '<div class="meta">'
    + '<div><div class="meta-label">Afhaaldag</div><div class="meta-val">' + dag + '</div></div>'
    + '<div><div class="meta-label">Dagdeel</div><div class="meta-val">' + dagdeel + '</div></div>'
    + '<div><div class="meta-label">Email</div><div class="meta-val" style="font-size:0.75rem">' + email + '</div></div>'
    + '<div><div class="meta-label">Telefoon</div><div class="meta-val">' + (tel || '-') + '</div></div>'
    + opmHtml
    + '</div>'
    + '</div>'
    + '<div class="kaart-voet">'
    + '<div><div class="totaal-label">Totaal</div><div class="totaal-bedrag">&euro; ' + totaal.toFixed(2).replace('.', ',') + '</div></div>'
    + '</div>'
    + '<div style="border-top:1px solid #eef2f8;padding:10px 16px;text-align:right">'
    + '<button onclick="druk(' + idx + ')" style="background:#1a4f8a;color:#fff;border:none;border-radius:7px;padding:7px 16px;font-size:0.8rem;font-weight:600;cursor:pointer">&#x1F5A8; Afdrukken</button>'
    + '</div>'
    + tikkieRij
    + '</div>';
}

function wisselTikkie(idx) {
  var el = document.getElementById('tik' + idx);
  var badge = document.getElementById('badge' + idx);
  tstate[idx] = el.checked;
  try { localStorage.setItem('tstate', JSON.stringify(tstate)); } catch(e) {}
  if (el.checked) {
    badge.textContent = 'Betaald';
    badge.className = 'badge badge-betaald';
  } else {
    badge.textContent = 'Nog niet betaald';
    badge.className = 'badge badge-open';
  }
}

laad();
</script>

</body>
</html>
