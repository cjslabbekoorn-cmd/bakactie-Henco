    :root{--blue:#1a4f8a;--orange:#f07d00;--green:#1a6e3c;--light:#f5f7fb;--border:#dde4f0}

.toolbar{background:var(--blue);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.toolbar h1{font-family:'DM Serif Display',serif;color:#fff;font-size:1.1rem;font-weight:400}
.toolbar small{display:block;color:#aac4e8;font-size:0.72rem;margin-top:2px}
.btn-reload{background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:7px;padding:8px 14px;font-size:0.8rem;font-weight:600;cursor:pointer;font-family:inherit}

.filters{background:#fff;border-bottom:1px solid var(--border);padding:10px 20px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filters label{font-size:0.75rem;font-weight:700;color:#999}
.filters select,.filters input{padding:5px 9px;border:1.5px solid var(--border);border-radius:6px;font-family:inherit;font-size:0.8rem;background:#fafbfd}

.stats{padding:12px 20px;display:flex;gap:10px;flex-wrap:wrap}
.stat{background:#fff;border:1px solid var(--border);border-radius:9px;padding:10px 16px;min-width:110px}
.stat-l{font-size:0.65rem;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:.4px}
.stat-v{font-size:1.3rem;font-weight:700;color:var(--blue);margin-top:2px}
.stat-v.or{color:var(--orange)} .stat-v.gr{color:var(--green)}

#status{padding:40px 20px;text-align:center;color:#888;font-size:0.9rem}
#status.error{color:#c0392b}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;padding:0 20px 40px}

.card{background:#fff;border-radius:12px;border:1.5px solid var(--border);overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04);transition:opacity .3s,filter .3s}
.card.done{opacity:.35;filter:grayscale(1)}

.card-head{background:var(--blue);padding:14px 16px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.card-head .naam{font-family:'DM Serif Display',serif;color:#fff;font-size:1.1rem;font-weight:400}
.card-head .ts{color:#aac4e8;font-size:0.72rem;margin-top:2px}

.badge{padding:4px 10px;border-radius:16px;font-size:0.7rem;font-weight:700;white-space:nowrap;flex-shrink:0}
.b-tikkie-open{background:#fff3e0;color:var(--orange)}
.b-tikkie-paid{background:#e8f5e9;color:var(--green)}
.b-contant{background:#e8f5e9;color:var(--green)}

.card-body{padding:14px 16px}
.prow{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid #f0f4fa}
.prow:last-child{border-bottom:none}
.pqty{background:var(--blue);color:#fff;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;flex-shrink:0}
.pnm{font-weight:600;font-size:0.85rem;flex:1}
.ppr{font-weight:700;color:var(--orange);font-size:0.85rem}
.stag{display:inline-block;background:#eef2f8;color:#555;border-radius:4px;padding:2px 6px;font-size:0.68rem;margin:2px 2px 0 0}

.meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;background:var(--light);border-radius:8px;padding:10px 12px}
.ml{font-size:0.62rem;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:.3px}
.mv{font-size:0.82rem;font-weight:500;margin-top:1px}

.card-foot{border-top:2px dashed var(--border);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;background:#fafbfd}
.tl{font-size:0.65rem;font-weight:700;color:#bbb;text-transform:uppercase}
.tb{font-size:1.3rem;font-weight:700;color:var(--blue)}
.don-b{background:#e8f0fb;color:var(--blue);border-radius:6px;padding:3px 9px;font-size:0.72rem;font-weight:600}

.card-actions{border-top:1px solid var(--border)}
.arow{display:flex;align-items:center;gap:9px;padding:9px 16px;border-bottom:1px solid #f0f4fa}
.arow:last-child{border-bottom:none}
.arow label{font-size:0.78rem;font-weight:600;color:#555;cursor:pointer;flex:1}
.arow input[type=checkbox]{width:16px;height:16px;accent-color:var(--green);cursor:pointer;flex-shrink:0}

.switch{position:relative;display:inline-block;width:38px;height:21px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.sl{position:absolute;cursor:pointer;inset:0;background:#ddd;border-radius:21px;transition:.25s}
.sl:before{content:"";position:absolute;width:15px;height:15px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.25s}
input:checked+.sl{background:var(--green)}
input:checked+.sl:before{transform:translateX(17px)}

.btn-print{margin-left:auto;background:var(--blue);color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:0.75rem;font-weight:600;cursor:pointer;font-family:inherit}
.btn-print:hover{opacity:.85}

<body>

<div class="toolbar">
  <div>
    <h1>📦 Pakbonnen – Bakactie Alpe d'HuZes</h1>
    <small id="ts">Laden...</small>
  </div>
  <button class="btn-reload" onclick="laad()">↺ Vernieuwen</button>
</div>

<div class="filters">
  <label>Dag:</label>
  <select id="fdag" onchange="render()"><option value="">Alle dagen</option></select>
  <label>Betaling:</label>
  <select id="fbet" onchange="render()">
    <option value="">Alles</option>
    <option value="tikkie">Tikkie</option>
    <option value="contant">Contant</option>
  </select>
  <label>Zoek:</label>
  <input id="fzoek" placeholder="Naam of email..." oninput="render()" style="width:180px">
</div>

<div class="stats" id="stats"></div>
<div id="status">⏳ Bestellingen laden...</div>
<div class="grid" id="grid"></div>

<script>
var orders = [];
var tstate = {}; // tikkie betaald per index
var astate = {}; // afgehandeld per index

function laad() {
  document.getElementById('status').textContent = '⏳ Bestellingen laden...';
  document.getElementById('status').className = '';
  document.getElementById('status').style.display = 'block';
  document.getElementById('grid').innerHTML = '';
  document.getElementById('stats').innerHTML = '';

  var url = 'https://raw.githubusercontent.com/cjslabbekoorn-cmd/bakactie-Henco/main/bestellingen.csv?nc=' + Date.now();
  var xhr = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.timeout = 15000;
  xhr.onload = function() {
    if (xhr.status === 200) {
      try {
        orders = parseCSV(xhr.responseText);
        document.getElementById('ts').textContent = 'Bijgewerkt: ' + new Date().toLocaleString('nl-NL');
        document.getElementById('status').style.display = 'none';
        vulDagen();
        render();
      } catch(e) {
        fout('Parse fout: ' + e.message);
      }
    } else {
      fout('HTTP fout: ' + xhr.status);
    }
  };
  xhr.onerror = function() { fout('Netwerkfout – controleer verbinding'); };
  xhr.ontimeout = function() { fout('Timeout – probeer opnieuw'); };
  xhr.send();
}

function fout(msg) {
  var el = document.getElementById('status');
  el.innerHTML = '❌ ' + msg + '<br><br><button onclick="laad()" style="margin-top:10px;padding:9px 18px;background:#1a4f8a;color:#fff;border:none;border-radius:7px;font-family:inherit;font-size:0.85rem;cursor:pointer">↺ Opnieuw</button>';
  el.className = 'error';
  el.style.display = 'block';
}

function parseCSV(txt) {
  var lines = txt.trim().split('\n');
  var res = [];
  for (var i = 1; i < lines.length; i++) {
    var line = lines[i].trim();
    if (!line) continue;
    var cols = [], inQ = false, cur = '';
    for (var c = 0; c < line.length; c++) {
      var ch = line[c];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    cols.push(cur.trim());
    if (cols.length >= 8) res.push(cols);
  }
  return res;
}

function vulDagen() {
  var sel = document.getElementById('fdag');
  var dagen = [];
  orders.forEach(function(o) { if (o[8] && dagen.indexOf(o[8]) < 0) dagen.push(o[8]); });
  sel.innerHTML = '<option value="">Alle dagen</option>';
  dagen.forEach(function(d) { sel.innerHTML += '<option value="' + d + '">' + d + '</option>'; });
}

function render() {
  var dag = document.getElementById('fdag').value;
  var bet = document.getElementById('fbet').value;
  var zoek = document.getElementById('fzoek').value.toLowerCase();

  var filtered = orders.filter(function(o, i) {
    if (dag && o[8] !== dag) return false;
    var isTik = (o[10]||'').toLowerCase().indexOf('tikkie') >= 0;
    if (bet === 'tikkie' && !isTik) return false;
    if (bet === 'contant' && isTik) return false;
    if (zoek && (o[1]||'').toLowerCase().indexOf(zoek) < 0 && (o[2]||'').toLowerCase().indexOf(zoek) < 0) return false;
    return true;
  });

  var totaal = 0, tik = 0, con = 0, don = 0;
  filtered.forEach(function(o) {
    totaal += parseFloat(o[7]) || 0;
    don += parseFloat(o[12]) || 0;
    if ((o[10]||'').toLowerCase().indexOf('tikkie') >= 0) tik++; else con++;
  });

  document.getElementById('stats').innerHTML =
    stat('Bestellingen', filtered.length, '') +
    stat('Totaal omzet', '€ ' + totaal.toFixed(2).replace('.',','), 'or') +
    stat('Tikkie', tik, '') +
    stat('Contant', con, 'or') +
    (don > 0 ? stat('💙 Donaties', '€ ' + don.toFixed(2).replace('.',','), 'gr') : '');

  var html = '';
  filtered.forEach(function(o) {
    var i = orders.indexOf(o);
    html += kaart(o, i);
  });
  document.getElementById('grid').innerHTML = html || '<p style="color:#bbb;padding:40px;grid-column:1/-1;text-align:center">Geen bestellingen gevonden.</p>';

  // Herstel state
  filtered.forEach(function(o) {
    var i = orders.indexOf(o);
    if (tstate[i]) {
      var el = document.getElementById('tik-' + i);
      if (el) { el.checked = true; setBadge(i, true); }
    }
    if (astate[i]) {
      var el2 = document.getElementById('chk-' + i);
      if (el2) { el2.checked = true; document.getElementById('card-' + i).classList.add('done'); }
    }
  });
}

function stat(l, v, cls) {
  return '<div class="stat"><div class="stat-l">' + l + '</div><div class="stat-v ' + cls + '">' + v + '</div></div>';
}

function kaart(o, i) {
  var naam=o[1], ts=o[0], email=o[2], tel=o[3], kruid=parseInt(o[4])||0, cup=parseInt(o[5])||0;
  var smaken=o[6]||'', totaal=parseFloat(o[7])||0, dag=o[8]||'', dagdeel=o[9]||'';
  var betaling=o[10]||'', opm=o[11]||'', donatie=parseFloat(o[12])||0;
  var isTik = betaling.toLowerCase().indexOf('tikkie') >= 0;

  var prod = '';
  if (kruid > 0) prod += prow(kruid, '🥮 Kruidkoek', '', (kruid*7.5).toFixed(2).replace('.',','));
  if (cup > 0) {
    var tags = smaken.split('|').map(function(s){return s.trim();}).filter(Boolean).map(function(s){return '<span class="stag">'+s+'</span>';}).join('');
    prod += prow(cup, '🧁 Cupcakes', tags, (cup*6).toFixed(2).replace('.',','));
  }
  if (donatie > 0) prod += '<div class="prow"><div class="pqty" style="background:#1a6e3c">1</div><div class="pnm">💙 Extra donatie <span style="font-weight:400;font-size:0.72rem;color:#1a6e3c">Alpe d\'HuZes</span></div><div class="ppr" style="color:#1a6e3c">€ ' + donatie.toFixed(2).replace('.',',') + '</div></div>';

  var opmHTML = opm ? '<div style="grid-column:1/-1"><div class="ml">💬 Opmerkingen</div><div class="mv" style="color:#e67e00">' + opm + '</div></div>' : '';
  var donHTML = donatie > 0 ? '<span class="don-b">💙 € ' + donatie.toFixed(2).replace('.',',') + '</span>' : '';
  var tikRow = isTik ? '<div class="arow"><label class="switch"><input type="checkbox" id="tik-'+i+'" onchange="onTik('+i+')"><span class="sl"></span></label><label for="tik-'+i+'">📱 Tikkie ontvangen / betaald</label></div>' : '';

  return '<div class="card" id="card-'+i+'">'
    + '<div class="card-head"><div><div class="naam">'+naam+'</div><div class="ts">'+ts+'</div></div>'
    + '<span class="badge ' + (isTik ? 'b-tikkie-open' : 'b-contant') + '" id="badge-'+i+'">' + (isTik ? '📱 Tikkie – nog niet betaald' : '💵 Contant – nog betalen') + '</span>'
    + '</div>'
    + '<div class="card-body"><div>' + prod + '</div>'
    + '<div class="meta"><div><div class="ml">📅 Afhaaldag</div><div class="mv">'+dag+'</div></div><div><div class="ml">⏰ Dagdeel</div><div class="mv">'+dagdeel+'</div></div><div><div class="ml">📧 Email</div><div class="mv" style="font-size:0.72rem">'+email+'</div></div><div><div class="ml">📱 Telefoon</div><div class="mv">'+(tel||'–')+'</div></div>'+opmHTML+'</div>'
    + '</div>'
    + '<div class="card-foot"><div><div class="tl">Totaalbedrag</div><div class="tb">€ '+totaal.toFixed(2).replace('.',',')+'</div></div>'+donHTML+'</div>'
    + '<div class="card-actions">'+tikRow
    + '<div class="arow"><input type="checkbox" id="chk-'+i+'" onchange="onChk('+i+')"><label for="chk-'+i+'">✅ Bestelling afgehandeld / uitgeleverd</label><button class="btn-print" onclick="druk('+i+')">🖨️ Afdrukken</button></div>'
    + '</div></div>';
}

function prow(qty, nm, tags, prijs) {
  return '<div class="prow"><div class="pqty">'+qty+'</div><div class="pnm">'+nm+(tags?'<br><span style="font-weight:400;font-size:0.7rem;color:#888">'+tags+'</span>':'')+'</div><div class="ppr">€ '+prijs+'</div></div>';
}

function setBadge(i, betaald) {
  var b = document.getElementById('badge-'+i);
  if (!b) return;
  b.textContent = betaald ? '📱 Tikkie – betaald ✓' : '📱 Tikkie – nog niet betaald';
  b.className = 'badge ' + (betaald ? 'b-tikkie-paid' : 'b-tikkie-open');
}

function onTik(i) {
  var checked = document.getElementById('tik-'+i).checked;
  tstate[i] = checked;
  setBadge(i, checked);
}

function onChk(i) {
  var checked = document.getElementById('chk-'+i).checked;
  astate[i] = checked;
  document.getElementById('card-'+i).classList.toggle('done', checked);
}

function druk(i) {
  var o = orders[i];
  var naam=o[1], ts=o[0], email=o[2], tel=o[3], kruid=parseInt(o[4])||0, cup=parseInt(o[5])||0;
  var smaken=o[6]||'', totaal=parseFloat(o[7])||0, dag=o[8]||'', dagdeel=o[9]||'';
  var betaling=o[10]||'', opm=o[11]||'', donatie=parseFloat(o[12])||0;
  var isTik = betaling.toLowerCase().indexOf('tikkie') >= 0;
  var betaald = isTik && tstate[i];

  var badgeTxt = isTik ? (betaald ? '📱 Tikkie – betaald ✓' : '📱 Tikkie – nog niet betaald') : '💵 Contant – betalen op locatie';
  var badgeStl = isTik ? (betaald ? 'background:#e8f5e9;color:#1a6e3c' : 'background:#fff3e0;color:#f07d00') : 'background:#e8f5e9;color:#1a6e3c';

  var prod = '';
  if (kruid > 0) prod += '<div class="pr"><div class="pq">'+kruid+'</div><div class="pn">🥮 Kruidkoek</div><div class="pp">€ '+(kruid*7.5).toFixed(2).replace('.',',')+'</div></div>';
  if (cup > 0) {
    var tags = smaken.split('|').map(function(s){return s.trim();}).filter(Boolean).map(function(s){return '<span class="st">'+s+'</span>';}).join('');
    prod += '<div class="pr"><div class="pq">'+cup+'</div><div class="pn">🧁 Cupcakes'+(tags?'<br><small style="font-weight:400;color:#888">'+tags+'</small>':'')+'</div><div class="pp">€ '+(cup*6).toFixed(2).replace('.',',')+'</div></div>';
  }
  if (donatie > 0) prod += '<div class="pr"><div class="pq" style="background:#1a6e3c">1</div><div class="pn">💙 Extra donatie</div><div class="pp" style="color:#1a6e3c">€ '+donatie.toFixed(2).replace('.',',')+'</div></div>';

  var opmHTML = opm ? '<div style="grid-column:1/-1"><div class="ml">💬 Opmerkingen</div><div class="mv" style="color:#e67e00;font-weight:600">'+opm+'</div></div>' : '';
  var donHTML = donatie > 0 ? '<div style="background:#e8f0fb;color:#1a4f8a;border-radius:7px;padding:6px 14px;font-size:0.82rem;font-weight:600">💙 Donatie € '+donatie.toFixed(2).replace('.',',')+'</div>' : '';

  var w = window.open('','_blank','width=850,height=1200');
  w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Pakbon '+naam+'</title>'
  +'<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">'
  +'<style>'
  +'*{box-sizing:border-box;margin:0;padding:0}'
  +'@page{size:A4 portrait;margin:0}'
  +'html,body{width:210mm;height:297mm;overflow:hidden;background:#fff;font-family:"DM Sans",sans-serif}'
  +'body{display:flex;flex-direction:column}'
  +'.hd{background:#1a4f8a;padding:15mm 15mm 11mm;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-shrink:0}'
  +'.org{color:#aac4e8;font-size:0.72rem;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}'
  +'.nm{font-family:"DM Serif Display",serif;color:#fff;font-size:2rem;font-weight:400;line-height:1.15}'
  +'.ts2{color:#aac4e8;font-size:0.8rem;margin-top:7px}'
  +'.bdg{padding:7px 15px;border-radius:28px;font-size:0.8rem;font-weight:700;align-self:flex-start;margin-top:3px}'
  +'.bd{flex:1;padding:7mm 15mm;display:flex;flex-direction:column;gap:5mm;overflow:hidden}'
  +'.stl{font-size:0.62rem;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}'
  +'.prods{border:1.5px solid #dde4f0;border-radius:9px;overflow:hidden}'
  +'.pr{display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid #f0f4fa}'
  +'.pr:last-child{border-bottom:none}'
  +'.pq{background:#1a4f8a;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.9rem;font-weight:700;flex-shrink:0}'
  +'.pn{font-weight:600;font-size:0.92rem;flex:1}'
  +'.pp{font-weight:700;color:#f07d00;font-size:0.92rem}'
  +'.st{display:inline-block;background:#eef2f8;color:#555;border-radius:4px;padding:2px 7px;font-size:0.7rem;margin:3px 2px 0 0}'
  +'.meta{display:grid;grid-template-columns:1fr 1fr;gap:9px;background:#f5f7fb;border-radius:9px;padding:11px 14px}'
  +'.ml{font-size:0.62rem;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:.3px}'
  +'.mv{font-size:0.88rem;font-weight:500;margin-top:2px}'
  +'.ft{border-top:3px dashed #dde4f0;padding:9px 15mm 12mm;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}'
  +'.tl{font-size:0.62rem;font-weight:700;color:#bbb;text-transform:uppercase}'
  +'.tb{font-size:2rem;font-weight:700;color:#1a4f8a;line-height:1}'
  +'.br{text-align:center;color:#ccc;font-size:0.6rem;padding:0 15mm 5mm;flex-shrink:0}'
  +'</style></head><body>'

+’<div class="hd"><div><div class="org">Bakactie Alpe d'HuZes 2026</div><div class="nm">’+naam+’</div><div class="ts2">Besteld op ‘+ts+’</div></div>’
+’<span class="bdg" style="'+badgeStl+'">’+badgeTxt+’</span></div>’
+’<div class="bd">’
+’<div><div class="stl">Bestelling</div><div class="prods">’+prod+’</div></div>’
+’<div><div class="stl">Afhaalinformatie</div>’
+’<div class="meta">’
+’<div><div class="ml">📅 Afhaaldag</div><div class="mv">’+dag+’</div></div>’
+’<div><div class="ml">⏰ Dagdeel</div><div class="mv">’+dagdeel+’</div></div>’
+’<div><div class="ml">📧 Email</div><div class="mv" style="font-size:0.75rem">’+email+’</div></div>’
+’<div><div class="ml">📱 Telefoon</div><div class="mv">’+(tel||’–’)+’</div></div>’
+opmHTML+’</div></div>’
+’</div>’
+’<div class="ft"><div><div class="tl">Totaalbedrag</div><div class="tb">€ ‘+totaal.toFixed(2).replace(’.’,’,’)+’</div></div>’+donHTML+’</div>’

+’</body></html>’);
w.document.close();
}

laad();
